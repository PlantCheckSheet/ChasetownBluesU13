<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasetown Blues U13 Survey</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f9fafb;
        --muted: #d1d5db;
        --border: #374151;
        --primary: #d4af37;
        --primary-hover: #b8932f;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .card {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid rgba(55, 65, 81, 0.9);
      }

      .header {
        padding: 28px 28px 20px;
        background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        border-bottom: 1px solid rgba(55, 65, 81, 0.95);
        text-align: center;
      }

      .branding {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .team-logo {
        width: 160px;
        max-width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
      }

      .header h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.2;
      }

      .header p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .content {
        padding: 28px;
      }

      form {
        display: grid;
        gap: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-weight: 700;
        font-size: 0.98rem;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #1f2937;
        color: var(--text);
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus,
      select:focus {
        outline: 3px solid rgba(212, 175, 55, 0.18);
        border-color: #d4af37;
      }

      .question-block {
        padding: 18px;
        border: 1px solid #374151;
        border-radius: 14px;
        background: #0b1220;
      }

      .question-title {
        margin: 0 0 12px;
        font-size: 1.05rem;
      }

      .help {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        background: var(--primary);
        color: #111827;
        padding: 14px 20px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .note {
        font-size: 0.9rem;
        color: var(--muted);
      }
