<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasetown Blues U13 Survey</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f9fafb;
        --muted: #d1d5db;
        --border: #374151;
        --primary: #d4af37;
        --primary-hover: #b8932f;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .card {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid rgba(55, 65, 81, 0.9);
      }

      .header {
        padding: 28px 28px 20px;
        background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        border-bottom: 1px solid rgba(55, 65, 81, 0.95);
        text-align: center;
      }

      .branding {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .team-logo {
        width: 160px;
        max-width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
</html>
